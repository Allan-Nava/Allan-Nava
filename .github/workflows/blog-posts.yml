name: Latest Blog Posts

on:
  schedule:
    # runs every hour
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest dev.to posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dev.to/feed/allannava"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
