name: Issue triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      # Auto-label issues from their title (gitmoji + keywords). No external action,
      # so it can't break on a third-party outage. Labels must already exist.
      - uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || '').toLowerCase();
            const labels = new Set();
            const add = (cond, ...ls) => { if (cond) ls.forEach(l => labels.add(l)); };
            add(/(:bug:|🐛|\bbug\b|\bfix\b)/.test(title), 'bug');
            add(/(:sparkles:|✨|\bfeat\b|feature)/.test(title), 'enhancement');
            add(/(:memo:|📝|:books:|📚|\bdocs?\b|documentation|readme)/.test(title), 'documentation');
            add(/(secret|token|\bpat\b|api[_ ]?key|refresh|🔒|🔑|:lock:|:key:)/.test(title), 'needs-secret', 'blocked');
            if (labels.size === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [...labels],
            });
            core.info(`Applied: ${[...labels].join(', ')}`);
