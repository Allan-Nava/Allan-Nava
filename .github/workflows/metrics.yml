name: GitHub Metrics

on:
  schedule:
    # once a day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate metrics SVG
    steps:
      # Renders a self-contained SVG server-side and commits it to the dedicated
      # `assets-metrics` branch (never touches master → no stale human pushes, and
      # the image can never 503 like the public github-readme-stats instance).
      #
      # Requires a classic PAT with `repo` + `read:user` scopes as the
      # `METRICS_TOKEN` repo secret. Until it exists this workflow fails.
      # After the first successful run, embed it in the README with:
      #   https://raw.githubusercontent.com/Allan-Nava/Allan-Nava/assets-metrics/github-metrics.svg
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Allan-Nava
          filename: github-metrics.svg
          committer_branch: assets-metrics
          config_timezone: Europe/Rome
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
