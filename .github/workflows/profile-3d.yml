name: GitHub Profile 3D Contrib

on:
  schedule:
    # once a day at 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate 3D contribution calendar
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # Publish the generated SVGs to the dedicated `assets` branch instead of
      # master, so these binaries never make a human's `git push` go stale.
      - name: Deploy SVGs to the assets branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: assets
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
