name: Generate Snake

on:
  schedule:
    # runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip when a bot commit triggered this push, so master commits from the other
    # workflows don't cause pointless snake re-runs.
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Generate snake game from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=#10cf53&color_dots=#050505,#0b4d24,#10cf53,#5cf08f,#b8ffce

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
