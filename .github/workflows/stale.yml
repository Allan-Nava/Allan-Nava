name: Stale issues & PRs

on:
  schedule:
    # daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked `stale`.
            It will close in 14 days unless there's new activity. Remove the label
            or comment to keep it open.
          stale-pr-message: >
            This PR has had no activity for 60 days and is now marked `stale`.
            It will close in 14 days unless updated.
          # never auto-manage tracked or blocked work
          exempt-issue-labels: "backlog,blocked,needs-secret,help wanted"
          exempt-pr-labels: "backlog,blocked"
          exempt-all-milestones: true
