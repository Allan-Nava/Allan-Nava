name: Latest YouTube Videos

on:
  schedule:
    # runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-youtube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest YouTube videos into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UC1qqsojpiyZB9-u8O02IVVQ"
          max_post_count: 4
          comment_tag_name: "YOUTUBE-VIDEOS"
          template: "[$title]($url) <br>"
